{% extends "base.html" %}
{% load static %}

{% block css %}
    <link rel="stylesheet" href="{% static 'register.css' %}">
{% endblock %}

{% block content %}
    <h2>Registration</h2>

    {% if error_message %}
        <p class="error-text" style="color: red; font-weight: bold; margin-bottom: 20px;">
            {{ error_message }}
        </p>
    {% endif %}

    <form method="POST" action="" enctype="multipart/form-data" class="register-form">
        {% csrf_token %}

        <div class="form-row">
            <label>Login</label>
            <input type="text" class="f-row" name="username" required>
        </div>

        <div class="form-row">
            <label>Email</label>
            <input type="email" class="f-row" name="email" required>
        </div>

        <div class="form-row">
            <label>NickName</label>
            <input type="text" class="f-row" name="nickname">
        </div>

        <div class="form-row">
            <label>Password</label>
            <input type="password" class="f-row" name="password" required>
        </div>

        <div class="form-row">
            <label>Repeat password</label>
            <input type="password" class="f-row" name="password_confirm" required>
        </div>

        <div class="form-row">
            <label class="avatar">Upload avatar</label>
            
            <div class="ava-picture">
                <img src="{% static 'Hamster Eyes.jpeg' %}" alt="Avatar preview">
                <input type="file" name="avatar">
            </div>
        </div>

        <div class="form-row button-row">
            <button type="submit" class="submit-btn">Register!</button>
        </div>
    </form>
{% endblock %}
