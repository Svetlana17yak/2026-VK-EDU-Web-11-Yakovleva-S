<div class="pagination">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}" class="page-item">
        &laquo;
    </a>
    {% else %}
        <span class="page-item" style="visibility: hidden;">&laquo;</span>
    {% endif %}

    {% for p in page_range %}
        {% if p == page_obj.paginator.ELLIPSIS %}
            <span class="page-item">...</span>
        {% elif page_obj.number == p %}
            <span class="page-item active">{{ p }}</span>
        {% else %}
            <a href="?page={{ p }}" class="page-item">
                {{ p }}
            </a>
        {% endif %}
    {% endfor %}

    {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}" class="page-item">
                &raquo;
            </a>
    {% else %}
        <span class="page-item" style="visibility: hidden;">&raquo;</span>
    {% endif %}
</div>
